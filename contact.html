<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Escape From WrathGuard | Contact</title>
    <meta name="description" content="Contact the Escape From WrathGuard team.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260525e">
</head>
<body data-page="contact">
    <div class="viewer-shell">
        <header class="viewer-topbar panel-cutout reveal-up">
            <div class="viewer-topbar-links">
                <a class="ghost-link" href="index.html">Home</a>
                <a class="ghost-link" href="talent-tree.html">Talent Trees</a>
                <a class="ghost-link" href="stats.html">Stats</a>
                <a class="ghost-link" href="https://discord.gg/Rebn99J95F" target="_blank" rel="noreferrer">Discord</a>
            </div>
            <div class="viewer-branding">
                <div class="eyebrow">Escape From Wrathguard</div>
                <div class="viewer-brand-title">Contact</div>
            </div>
        </header>

        <main class="contact-main">
            <section class="tree-hero panel-cutout reveal-up">
                <h1>Send A Message</h1>
                <p class="tree-description">Fill out the form below and submit it directly to the WrathGuard inbox.</p>
            </section>

            <section class="contact-grid reveal-up">
                <article class="panel-cutout contact-panel">
                    <form class="contact-form" id="contactForm" action="https://formsubmit.co/escapefromwrathguard@gmail.com" method="POST">
                        <input type="hidden" name="_subject" value="Escape From WrathGuard Contact Form">
                        <input type="hidden" name="_captcha" value="false">
                        <input type="hidden" name="_template" value="table">
                        <label class="contact-field" for="contactName">
                            <span>Name</span>
                            <input class="contact-input" id="contactName" name="name" type="text" autocomplete="name" required>
                        </label>
                        <label class="contact-field" for="contactEmail">
                            <span>Email</span>
                            <input class="contact-input" id="contactEmail" name="email" type="email" autocomplete="email" required>
                        </label>
                        <label class="contact-field" for="contactSubject">
                            <span>Subject</span>
                            <input class="contact-input" id="contactSubject" name="subject" type="text" required>
                        </label>
                        <label class="contact-field" for="contactMessage">
                            <span>Message</span>
                            <textarea class="contact-input contact-textarea" id="contactMessage" name="message" rows="8" required></textarea>
                        </label>
                        <div class="contact-actions">
                            <button class="button-ornate" type="submit">Send Email</button>
                        </div>
                        <p class="contact-note">Messages are sent to escapefromwrathguard@gmail.com. The first submission may require confirming FormSubmit activation from that inbox.</p>
                    </form>
                </article>
            </section>
        </main>
    </div>

    <script src="js/app.js?v=20260525e" defer></script>
</body>
</html>

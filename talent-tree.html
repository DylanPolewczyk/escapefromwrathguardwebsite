<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Escape From Wrathguard | Talent Tree Viewer</title>
    <meta name="description" content="Inspect individual Escape From Wrathguard talent trees in an interactive browser viewer.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260524p">
</head>
<body data-page="tree">
    <div class="viewer-shell">
        <header class="viewer-topbar panel-cutout reveal-up">
            <a class="ghost-link" href="index.html">All Classes</a>
            <div class="viewer-branding">
                <div class="eyebrow">Escape From Wrathguard</div>
                <div class="viewer-brand-title">Interactive Talent Viewer</div>
            </div>
        </header>

        <div class="state-message hidden" data-state-message></div>

        <div class="viewer-layout">
            <main class="viewer-main reveal-up">
                <section class="panel-cutout class-rail-panel viewer-class-panel">
                    <div class="eyebrow">Switch Class</div>
                    <div class="class-rail" id="classRail"></div>
                    <div class="viewer-controls viewer-controls-panel">
                        <div class="detail-label" id="classPreviewTitle">Class Preview</div>
                        <div class="viewer-level-panel">
                            <label class="detail-label viewer-level-label" for="playerLevelInput">Player Level</label>
                            <div class="viewer-level-row">
                                <input class="viewer-level-input" id="playerLevelInput" type="number" min="1" step="1" inputmode="numeric" value="1">
                                <span class="stat-pill viewer-points-pill" id="availableTalentPoints">0 Available</span>
                            </div>
                            <div class="viewer-level-note" id="levelPointHint">1 point every 2 levels</div>
                        </div>
                        <button class="button-ghost" id="resetClassPreviewButton" type="button">Reset Class Preview</button>
                    </div>
                </section>

                <section class="tree-hero panel-cutout" id="treeHero">
                    <div class="eyebrow" id="treeEyebrow">Talent Tree</div>
                    <h1 id="treeTitle">Loading...</h1>
                    <p class="tree-description" id="treeDescription">Exported class summary will appear here.</p>
                    <div class="tree-stats" id="treeStats"></div>
                </section>

                <section class="panel-cutout board-panel">
                    <div class="board-scroll">
                        <div class="board-fit" id="boardFit">
                            <div class="talent-board" id="talentBoard"></div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/app.js?v=20260524p" defer></script>
</body>
</html>
